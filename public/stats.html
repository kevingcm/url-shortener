<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stats — Shortly</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container container-wide">
    <a href="/" class="back-link">← Back</a>
    <h1 id="stats-title">Stats</h1>
    <p class="tagline" id="stats-subtitle"></p>

    <div id="error" class="error hidden"></div>

    <section id="stats-content" class="hidden">
      <div class="stat-big">
        <span id="total-clicks">0</span>
        <label>total clicks</label>
      </div>

      <h2>Clicks by day (last 30)</h2>
      <table class="stats-table">
        <thead><tr><th>Day</th><th>Clicks</th></tr></thead>
        <tbody id="by-day-body"></tbody>
      </table>

      <h2>Top referrers</h2>
      <table class="stats-table">
        <thead><tr><th>Referrer</th><th>Clicks</th></tr></thead>
        <tbody id="referrers-body"></tbody>
      </table>
    </section>
  </main>

  <script src="/stats.js"></script>
</body>
</html>
